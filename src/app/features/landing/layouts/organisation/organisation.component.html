<div class=" overflow-x-hidden m-0!">
    <p-organization-chart [value]="data" [collapsible]="true" class="">
        <ng-template let-node pTemplate="person">
            <div class="flex flex-col">
                <div class="flex flex-col items-center">
                    <img [src]="node.data.image" class="mb-4 w-12  md:w-16 lg:w-20 h-12 md:h-16 lg:h-20 object-fill! rounded-full" />
                    <span class="font-bold mb-2">{{ node.data.name }}</span>
                    <span>{{ node.data.title }}</span>
                </div>
            </div>
        </ng-template>
    </p-organization-chart>
</div>
