<section
    #statsSection 
    class="w-screen h-[80vh] md:h-44 grid grid-cols-2 md:grid-cols-4 border-t border-line-color"
    >
    <div
        class="flex flex-col items-center justify-center border-r border-b border-line-color"
        >
        <h2 
            class="title-1 text-clr-active!"
            >
            {{projectCount }}
        </h2>
        <p
            class="text-base secondary"
            >
            Entreprises Accopagnées
        </p>
    </div>

    <div
        class="flex flex-col items-center justify-center border-r border-b border-line-color"
        >
        <h2
            class="title-1 text-clr-active!"
            >
            +{{userCount}}
        </h2>
        <p
            class="text-base secondary"
            >
            Utilisateurs
        </p>
    </div>
    
    <div
        class="flex flex-col items-center justify-center border-r border-b border-line-color"
        >
        <h2
            class="title-1 text-clr-active!"
            >
            {{partnerCount}}
        </h2>
        <p
            class="text-base secondary"
            >
            Partenaires
        </p>
    </div>
    <div
        class="flex flex-col items-center justify-center border-r border-b border-line-color"
        >
        <h2
            class="title-1 text-clr-active!"
            >
            {{satisfaction}}%
        </h2>
        <p
            class="text-base secondary"
            >
            de satisfaction
        </p>
    </div>
</section>
